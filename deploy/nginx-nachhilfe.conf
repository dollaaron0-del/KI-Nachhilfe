server {
    listen 8080;
    server_name _;
    client_max_body_size 25M;

    # Komprimierung der vom Node-Backend durchgereichten Assets.
    # gzip ist global (nginx.conf) "on", greift bei proxied Antworten aber nur
    # mit gzip_proxied – sonst bleibt alles unkomprimiert, weil hier alles geproxied wird.
    gzip_proxied any;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # X-Forwarded-For ist Pflicht, damit Express' "trust proxy" die echte Client-IP
        # sieht (sonst landen alle Nutzer unter 127.0.0.1 im selben Rate-Limit-Eimer).
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
